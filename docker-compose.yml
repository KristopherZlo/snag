x-app-service: &app-service
  build:
    context: .
    dockerfile: apps/server/Dockerfile
  working_dir: /var/www/html
  env_file:
    - ./apps/server/.env

services:
  app:
    <<: *app-service
    depends_on:
      - postgres
      - redis
      - minio-init
      - mailpit

  worker:
    <<: *app-service
    command: php artisan queue:work --tries=1 --timeout=0
    depends_on:
      - app

  scheduler:
    <<: *app-service
    command: php artisan schedule:work
    depends_on:
      - app

  reverb:
    <<: *app-service
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    depends_on:
      - redis

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: snag
      POSTGRES_USER: snag
      POSTGRES_PASSWORD: secret
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:8-alpine

  minio:
    image: minio/minio:RELEASE.2026-01-22T01-07-30Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: miniosecret
    volumes:
      - minio-data:/data

  minio-init:
    image: minio/mc:RELEASE.2026-01-17T03-41-37Z
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until /usr/bin/mc alias set local http://minio:9000 minio miniosecret; do sleep 1; done &&
      /usr/bin/mc mb --ignore-existing local/snag &&
      /usr/bin/mc anonymous set none local/snag
      "

  mailpit:
    image: axllent/mailpit:v1.27

volumes:
  postgres-data:
  minio-data:
