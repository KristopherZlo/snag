x-app-service: &app-service
  build:
    context: .
    dockerfile: apps/server/Dockerfile
  working_dir: /var/www/html
  env_file:
    - ./apps/server/.env

services:
  app:
    <<: *app-service
    healthcheck:
      test: ["CMD-SHELL", "php artisan about --only=environment >/dev/null 2>&1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      mailpit:
        condition: service_started

  worker:
    <<: *app-service
    command: php artisan queue:work --tries=1 --timeout=0
    depends_on:
      app:
        condition: service_healthy

  scheduler:
    <<: *app-service
    command: php artisan schedule:work
    depends_on:
      app:
        condition: service_healthy

  reverb:
    <<: *app-service
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    depends_on:
      redis:
        condition: service_healthy

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: snag
      POSTGRES_USER: snag
      POSTGRES_PASSWORD: secret
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:8-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: miniosecret
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s
    volumes:
      - minio-data:/data

  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      until /usr/bin/mc alias set local http://minio:9000 minio miniosecret; do sleep 1; done &&
      /usr/bin/mc mb --ignore-existing local/snag &&
      /usr/bin/mc anonymous set none local/snag
      "

  mailpit:
    image: axllent/mailpit:v1.27
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8025"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres-data:
  minio-data:
