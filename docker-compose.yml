services:
  nginx:
    image: nginx:1.29-alpine
    ports:
      - "8080:80"
    volumes:
      - ./apps/server:/var/www/html
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
      - reverb

  app:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    working_dir: /var/www/html
    volumes:
      - ./apps/server:/var/www/html
    env_file:
      - ./apps/server/.env
    depends_on:
      - postgres
      - redis
      - minio-init
      - mailpit

  worker:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    command: php artisan queue:work --tries=1 --timeout=0
    working_dir: /var/www/html
    volumes:
      - ./apps/server:/var/www/html
    env_file:
      - ./apps/server/.env
    depends_on:
      - app

  scheduler:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    command: php artisan schedule:work
    working_dir: /var/www/html
    volumes:
      - ./apps/server:/var/www/html
    env_file:
      - ./apps/server/.env
    depends_on:
      - app

  reverb:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    working_dir: /var/www/html
    volumes:
      - ./apps/server:/var/www/html
    env_file:
      - ./apps/server/.env
    depends_on:
      - redis

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: snag
      POSTGRES_USER: snag
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:8-alpine
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:RELEASE.2026-01-22T01-07-30Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: miniosecret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  minio-init:
    image: minio/mc:RELEASE.2026-01-17T03-41-37Z
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until /usr/bin/mc alias set local http://minio:9000 minio miniosecret; do sleep 1; done &&
      /usr/bin/mc mb --ignore-existing local/snag &&
      /usr/bin/mc anonymous set none local/snag
      "

  mailpit:
    image: axllent/mailpit:v1.27
    ports:
      - "8025:8025"
      - "1025:1025"

volumes:
  postgres-data:
  minio-data:
