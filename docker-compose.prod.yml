services:
  nginx:
    image: nginx:1.29-alpine
    depends_on:
      app:
        condition: service_healthy
      reverb:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/up || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    ports:
      - "8080:80"
    read_only: true
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
      - /var/cache/nginx
      - /var/run
    volumes:
      - app-public-root:/var/www/html/public:ro
      - ./infra/nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro

  app:
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      CONTAINER_CACHE_BOOTSTRAP: "1"
      CONTAINER_STORAGE_LINK: "1"
      CONTAINER_SYNC_PUBLIC_ROOT: "1"
    read_only: true
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    volumes:
      - app-public-root:/var/www/html/public
      - app-storage:/var/www/html/storage
      - app-bootstrap-cache:/var/www/html/bootstrap/cache

  worker:
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
    read_only: true
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    volumes:
      - app-storage:/var/www/html/storage
      - app-bootstrap-cache:/var/www/html/bootstrap/cache

  scheduler:
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
    read_only: true
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    volumes:
      - app-storage:/var/www/html/storage
      - app-bootstrap-cache:/var/www/html/bootstrap/cache

  reverb:
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
    read_only: true
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    volumes:
      - app-storage:/var/www/html/storage
      - app-bootstrap-cache:/var/www/html/bootstrap/cache

volumes:
  app-public-root:
  app-storage:
  app-bootstrap-cache:
