services:
  nginx:
    image: nginx:1.29-alpine
    depends_on:
      app:
        condition: service_healthy
      reverb:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/up || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    ports:
      - "8080:80"
    volumes:
      - app-public-root:/var/www/html/public
      - ./infra/nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro

  app:
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      CONTAINER_CACHE_BOOTSTRAP: "1"
      CONTAINER_STORAGE_LINK: "1"
      CONTAINER_SYNC_PUBLIC_ROOT: "1"
    volumes:
      - app-public-root:/var/www/html/public

  worker:
    environment:
      APP_ENV: production
      APP_DEBUG: "false"

  scheduler:
    environment:
      APP_ENV: production
      APP_DEBUG: "false"

  reverb:
    environment:
      APP_ENV: production
      APP_DEBUG: "false"

volumes:
  app-public-root:
