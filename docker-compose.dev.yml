services:
  nginx:
    image: nginx:1.29-alpine
    depends_on:
      app:
        condition: service_healthy
      reverb:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/up || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    ports:
      - "8080:80"
    volumes:
      - ./apps/server:/var/www/html
      - app-public-build:/var/www/html/public/build
      - ./infra/nginx/dev.conf:/etc/nginx/conf.d/default.conf:ro

  app:
    environment:
      CONTAINER_RUN_MIGRATIONS: "1"
      CONTAINER_SYNC_PUBLIC_BUILD: "1"
      CONTAINER_SYNC_VENDOR: "1"
      CONTAINER_STORAGE_LINK: "1"
    volumes:
      - ./apps/server:/var/www/html
      - app-vendor:/var/www/html/vendor
      - app-public-build:/var/www/html/public/build

  worker:
    volumes:
      - ./apps/server:/var/www/html
      - app-vendor:/var/www/html/vendor
      - app-public-build:/var/www/html/public/build

  scheduler:
    volumes:
      - ./apps/server:/var/www/html
      - app-vendor:/var/www/html/vendor
      - app-public-build:/var/www/html/public/build

  reverb:
    volumes:
      - ./apps/server:/var/www/html
      - app-vendor:/var/www/html/vendor
      - app-public-build:/var/www/html/public/build

  postgres:
    ports:
      - "5432:5432"

  redis:
    ports:
      - "6379:6379"

  minio:
    ports:
      - "9000:9000"
      - "9001:9001"

  mailpit:
    ports:
      - "8025:8025"
      - "1025:1025"

volumes:
  app-vendor:
  app-public-build:
